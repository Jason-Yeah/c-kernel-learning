syntax = "proto3";
package chat;

// 登录请求
message LoginRequest {
    string username = 1;
    string password = 2;
}

// 登录回复
message LoginResponse {
    bool   success = 1;
    string message = 2;
}

// 聊天消息
message ChatMessage {
    int32  sender   = 1;
    int32  receiver = 2;
    string content  = 3;
}

// 心跳
message Heartbeat {
    int64  timestamp = 1;
}
